spring:
  application:
    name: vaultpay-neobank

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vaultpay}
    username: ${DB_USERNAME:vaultpay}
    password: ${DB_PASSWORD:vaultpay}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  servlet:
    multipart:
      enabled: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
  tomcat:
    max-http-form-post-size: 1MB
    max-swallow-size: 1MB

app:
  cors:
    enabled: true
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
    allow-credentials: true
    max-age-seconds: 3600

  jwt:
    private-key: ${JWT_PRIVATE_KEY:}
    private-key-location: ${JWT_PRIVATE_KEY_LOCATION:}
    public-key-location: ${JWT_PUBLIC_KEY_LOCATION:}
    public-key: ${JWT_PUBLIC_KEY:}
    access-token-expiration-ms: 900000
    issuer: vaultpay
    refresh-token-expiration-ms: 604800000

  paystack:
    secret-key: ${PAYSTACK_SECRET_KEY}
    base-url: https://api.paystack.co

  rate-limit:
    enabled: true
    public-rate:
      requests-per-minute: 60
    auth:
      requests-per-minute: 120
    login:
      requests-per-minute: 10

  security:
    login:
      max-attempts: 5
      lockout-minutes: 15
    pin:
      max-attempts: 5
      lockout-minutes: 30

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.vaultpay: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
